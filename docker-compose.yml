services:
  frontend:
    build: ./frontend
    container_name: hek-net-frontend
    env_file: .env
    ports:
      - "${FRONTEND_PORT:-8000}:80"
    volumes:
      # Mountet den Frontend-Ordner in den Web-Root des Containers
      - ./frontend:/var/www/html
      # Mounte die .env Datei, damit PHP sie direkt parsen kann
      - ./.env:/var/www/html/.env
      # Mounte den Datenbank-Ordner (für SQLite und Schema)
      - ./database:/var/www/database
      # Mounte den Docker-Socket, um Docker-API-Aufrufe zu ermöglichen
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - db
      - rustfs
    restart: unless-stopped

  db:
    image: mariadb:latest
    container_name: hek-net-db
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-hek_net}
      MYSQL_USER: ${DB_USER:-hek_user}
      MYSQL_PASSWORD: ${DB_PASS:-hek_pass}
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

  rustfs:
    image: rustfs/rustfs:latest
    container_name: hek-net-s3
    env_file: .env
    ports:
      - "${S3_CONSOLE_PORT:-9001}:9001"
      - "${S3_API_PORT:-9000}:9000"
    volumes:
      - ./s3_data:/data
    restart: unless-stopped
